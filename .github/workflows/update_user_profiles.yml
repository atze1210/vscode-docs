name: Update User Profiles Database

on:
  schedule:
    - cron: '0 0 * * *'  # Runs every day at 00:00 UTC
  workflow_dispatch:  # Allows manual triggering

permissions:
  contents: write

jobs:
  update-user-profiles:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch contributor profiles from GitHub
        run: python src/scripts/user-profiles/fetch_user_profiles.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update database from JSON
        run: python src/scripts/user-profiles/update_db_from_json.py

      - name: Verify changes
        run: |
          echo "Checking for changes in data files..."
          git status

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/user-profiles/user_profiles.json data/user-profiles/user_profiles.db
          git commit -m "Updated user profiles database" || echo "No changes to commit."
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
